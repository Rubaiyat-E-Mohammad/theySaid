name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  e2e:
    name: "Shard ${{ matrix.shard }}/${{ strategy.job-total }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve Playwright version
        id: pw-version
        run: echo "version=$(node -e "process.stdout.write(require('./node_modules/@playwright/test/package.json').version)")" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v5
        id: pw-cache
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ steps.pw-version.outputs.version }}-chromium

      - name: Install Playwright browsers (cache miss)
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright browser deps (cache hit)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Verify required secrets
        env:
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
        run: |
          missing=()
          [[ -z "$TEST_EMAIL" ]] && missing+=("TEST_EMAIL")
          [[ -z "$TEST_PASSWORD" ]] && missing+=("TEST_PASSWORD")
          if (( ${#missing[@]} > 0 )); then
            echo "::error::Missing required GitHub Actions secrets: ${missing[*]}."
            exit 1
          fi

      - name: Run Playwright tests (shard ${{ matrix.shard }}/${{ strategy.job-total }})
        run: npx playwright test --shard=${{ matrix.shard }}/${{ strategy.job-total }} --reporter=blob
        env:
          CI: true
          BASE_URL: ${{ vars.BASE_URL }}
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}

      - name: Upload blob report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: blob-report-${{ matrix.shard }}
          path: blob-report/
          retention-days: 1

  merge-reports:
    name: Merge reports
    needs: e2e
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - uses: actions/download-artifact@v7
        with:
          pattern: blob-report-*
          merge-multiple: true
          path: all-blob-reports/

      - name: Merge into HTML + feature-map report
        run: npx playwright merge-reports --reporter=html,./utils/featureMapReporter.ts ./all-blob-reports

      - uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Delete blob artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ids=$(gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts" \
            --paginate --jq '.artifacts[] | select(.name | startswith("blob-report-")) | .id')
          for id in $ids; do gh api -X DELETE "repos/${{ github.repository }}/actions/artifacts/${id}" || true; done
